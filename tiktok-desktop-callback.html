<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ava Style TikTok Callback</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        --bg: #f7efe7;
        --panel: #fffaf4;
        --text: #24190f;
        --muted: #725d4b;
        --accent: #d44e2b;
        --line: rgba(94, 67, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(212, 78, 43, 0.16), transparent 26%),
          linear-gradient(180deg, #fbf6ee 0%, #f5ebdf 100%);
        color: var(--text);
      }

      main {
        width: min(680px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 28px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, white, var(--panel));
        box-shadow: 0 32px 80px rgba(93, 63, 37, 0.14);
      }

      h1 {
        margin: 0 0 12px;
        font-family: "Iowan Old Style", "Georgia", serif;
        font-size: 2.4rem;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.6;
      }

      code {
        padding: 2px 7px;
        border-radius: 8px;
        background: rgba(212, 78, 43, 0.08);
        color: var(--accent);
      }

      a {
        color: var(--accent);
        font-weight: 600;
      }

      .box {
        margin-top: 20px;
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--line);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Returning to Ava Style…</h1>
      <p id="status">We are sending the TikTok authorization response back to the local Ava Style desktop app.</p>
      <div class="box">
        <p>If nothing happens automatically, open Ava Style locally and then use this link:</p>
        <p><a id="manualLink" href="#">Continue to local callback</a></p>
        <p>The local callback target is <code>http://127.0.0.1:8769/tiktok/callback/</code>.</p>
      </div>
    </main>
    <script>
      const localTarget = "http://127.0.0.1:8769/tiktok/callback/" + window.location.search;
      const manualLink = document.getElementById("manualLink");
      const status = document.getElementById("status");
      manualLink.href = localTarget;
      status.textContent = "TikTok authorization received. Redirecting to the local Ava Style app now.";
      window.location.replace(localTarget);
    </script>
  </body>
</html>
